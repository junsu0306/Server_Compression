# ViT-Tiny  |  50% compression  |  Teacher: vit_small_patch16_224
#
# 실행 (GPU 6,7):
#   CUDA_VISIBLE_DEVICES=6,7 torchrun --nproc_per_node=2 train.py \
#     --config configs/vit_tiny_prune50_kd_small.yaml

model: vit_tiny_patch16_224
data_path: /workspace/etri_iitp/JS/Server_Compression/data/imagenet

# ── 학습 ──────────────────────────────────────────────────────────
epochs: 50
batch_size: 256        # per GPU
lr: 5.0e-5
weight_decay: 0.05
clip_grad: 1.0
warmup_epochs: 5
min_lr: 1.0e-6
smoothing: 0.1
amp: true
num_workers: 8

# ── EMA ───────────────────────────────────────────────────────────
model_ema: true
model_ema_decay: 0.9998

# ── Soft Pruning ──────────────────────────────────────────────────
target_compression: 0.50    # G_FFN sparsity ≈ 0.8053
pruning_max_sparsity: 0.95
prune_refresh_steps: 100
pruning_mode: global

# ── Knowledge Distillation ────────────────────────────────────────
kd_alpha: 0.5
kd_temperature: 4.0
kd_teacher: vit_small_patch16_224   # 81.4% top-1 (same norm: mean=std=0.5)

# ── 출력 ──────────────────────────────────────────────────────────
output_dir: ./output/vit_tiny_prune50_kd_small

# ── WandB ─────────────────────────────────────────────────────────
wandb: true
wandb_project: vit-pruning
wandb_run_name: "vit_tiny_prune50_kd_small"
