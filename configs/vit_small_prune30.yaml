# ViT-Small  |  30% compression  |  GPU 4,5,6,7 (11GB × 4)
#
# 실행:
#   CUDA_VISIBLE_DEVICES=4,5,6,7 torchrun --nproc_per_node=4 train.py \
#     --config configs/vit_small_prune30.yaml

model: vit_small_patch16_224
data_path: /workspace/etri_iitp/JS/Server_Compression/data/imagenet

# ── 학습 ──────────────────────────────────────────────────────────
epochs: 50
batch_size: 128        # per GPU  →  총 512 (×4 GPU)
lr: 5.0e-5
weight_decay: 0.05
clip_grad: 1.0
warmup_epochs: 5
min_lr: 1.0e-6
smoothing: 0.1
amp: true
num_workers: 8

# ── EMA ───────────────────────────────────────────────────────────
model_ema: true
model_ema_decay: 0.9998

# ── Soft Pruning ──────────────────────────────────────────────────
target_compression: 0.30    # G_FFN sparsity ≈ 0.4665
pruning_max_sparsity: 0.95
prune_refresh_steps: 100

# ── 출력 ──────────────────────────────────────────────────────────
output_dir: ./output/vit_small_prune30

# ── WandB ─────────────────────────────────────────────────────────
wandb: true
wandb_project: vit-pruning
wandb_run_name: ""
